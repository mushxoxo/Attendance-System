steps:
  # ── Step 1: Build the Docker image ──────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/attendance-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/attendance-backend:latest'
      - './backend'

  # ── Step 2: Push the image to Container Registry ────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/attendance-backend'

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'attendance-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/attendance-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '10'
      - '--startup-cpu-boost'
      - '--min-instances'
      - '0'

images:
  - 'gcr.io/$PROJECT_ID/attendance-backend'

options:
  logging: CLOUD_LOGGING_ONLY
